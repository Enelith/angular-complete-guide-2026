<app-header />

<!--
@for and @if are relatively new, they were introduced with Angular 17.
As for Legacy Angular, there were ngFor and ngIf (both should be removed from Angular 22.
-->
<main>
  <ul id="users">
    <!--
    With the "track" expression, we're telling Angular which unique identification data can be assigned
    by Angular automatically behind the scenes to every list item
    (in our case, every items Angular renders will have the unique userItem.id, which helps Angular
    to update the list if the list data would change).
    -->
    @for (userItem of users; track userItem.id) {
      <li>
        <!-- Using Property Binding to set `user` -->
        <app-user [user]="userItem"
                  [selected]="targetUserId === userItem.id"
                  (selectedUser)="onAppHandleSelectedUser($event)" />
      </li>
    }

    <!-- Structural directive *ngFor -->
    <!-- Note that in order to unlock *ngFor, you need to import it in app.ts from NgFor@angular/common package (as well as in the @Component#imports) -->
    <!--
    <li *ngFor="let userItem of users">
      <app-user [user]="userItem"
                (selectedUser)="onAppHandleSelectedUser($event)" />
    </li>
    -->
  </ul>

  @if (targetedUser) {
    <app-tasks [userId]="targetedUser.id"
               [name]="targetedUser.name"/>
  } @else {
    <p id="fallback">Select a user to see their tasks!</p>
  }

  <!-- Structural directive *ngIf -->
  <!-- Note that in order to unlock *ngIf, you need to import it in app.ts from NgIf@angular/common package (as well as in the @Component#imports) -->
  <!--
  <app-tasks *ngIf="targetedUser; else fallback" [name]="targetedUser!.name" />
  <ng-template #fallback>
    <p id="fallback">Select a user to see their tasks!</p>
  </ng-template>
  -->
</main>
