@if (isAddingTask) {
  <app-new-task [userId]="userId"
                (closing)="onCloseAddTask()" />
}

<section id="tasks">
  <header>
    <!-- String Interpolation -->
    <h2>{{ name }}'s Tasks</h2>
    <menu>
      <button (click)="onStartAddTask()">Add Task</button>
    </menu>
  </header>

  <ul>
    @for (taskItem of selectedUserTasks; track taskItem.id) {
      <li>
        <app-task [task]="taskItem"
                  (complete)="onTaskCompleted($event)" />
      </li>
    }
  </ul>
</section>
