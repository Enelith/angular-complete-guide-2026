<!-- Desired Markup -->
<div>
  <!-- Adding an event listener, ex: (click)=... -->
  <button (click)="onSelectingUser()" >
    <!-- Property Binding Syntax -->
    <img [src]="imagePath"
         [alt]="user.name" />

    <!-- String Interpolation -->
    <span>{{ user?.name }}</span>
  </button>
</div>
